apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-app
  namespace: default        # ← ajoute cette ligne
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlops-app
  template:
    metadata:
      labels:
        app: mlops-app
    spec:
      containers:
      - name: mlops-app
        image: johan1704/gitops-project:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000